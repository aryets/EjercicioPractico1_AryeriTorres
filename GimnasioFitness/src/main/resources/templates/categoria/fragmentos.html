<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    
    <!-- 1. Agregar categoría -->
    <section th:fragment="agregar">
        <button type="button" class="btn btn-secondary rounded-pill px-4" 
                data-bs-toggle="modal" data-bs-target="#agregarCategoriaModal">
            <i class="fa-solid fa-plus"></i> [[#{categoria.agregar}]]
        </button>

        <div class="modal fade" id="agregarCategoriaModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content bg-dark text-light">
                    <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post">
                        <div class="modal-header bg-secondary text-white">
                            <h5 class="modal-title">[[#{categoria.agregar}]]</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <label>[[#{categoria.nombre}]]</label>
                            <input type="text" th:field="*{nombre}" class="form-control bg-dark text-light border-secondary" required/>
                        </div>
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-outline-light">[[#{accion.guardar}]]</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- 2. Listado de categorías -->
    <section th:fragment="listado">
        <table class="table table-dark table-striped table-bordered shadow">
            <thead class="table-secondary">
                <tr>
                    <th>[[#{categoria.nombre}]]</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${categorias}">
                    <td th:text="${c.nombre}"></td>
                    <td class="text-center">
                        <a th:href="@{/categoria/eliminar/{id}(id=${c.id})}" class="btn btn-sm btn-outline-light me-2">
                            <i class="fa fa-trash"></i> Eliminar
                        </a>
                        <a th:href="@{/categoria/modificar/{id}(id=${c.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="fa fa-pencil-alt"></i> Editar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
        <p class="fw-bold">[[#{categoria.total}]]: <span th:text="${totalCategorias}"></span></p>
    </section>

    <!-- 3. Editar categoría -->
    <section th:fragment="editar">
        <div class="modal fade" id="editarCategoriaModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content bg-dark text-light">
                    <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post">

                        <!-- Encabezado del modal -->
                        <div class="modal-header bg-secondary text-white">
                            <h5 class="modal-title">[[#{accion.actualizar}]]</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>

                        <!-- Cuerpo del modal -->
                        <div class="modal-body">
                            <input type="hidden" th:field="*{id}"/>
                            <label>[[#{categoria.nombre}]]</label>
                            <input type="text" th:field="*{nombre}" 
                                   class="form-control bg-dark text-light border-secondary" required/>
                        </div>

                        <!-- Pie del modal -->
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-outline-light">
                                <i class="fa fa-check"></i> [[#{accion.guardar}]]
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
    
    <!-- 4. Confirmar eliminación -->
    <section th:fragment="confirmarEliminar">
        <div class="modal fade" 
             id="confirmModal" 
             tabindex="-1" 
             aria-labelledby="modalLabel" 
             aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content bg-dark text-light">
                    <form th:action="@{/categoria/eliminar}" method="post">
                        <!-- Campo oculto para el id -->
                        <input type="hidden" name="id" id="modalId"/>

                        <!-- Encabezado del modal -->
                        <div class="modal-header bg-warning text-white">
                            <h5 class="modal-title" id="modalLabel">
                                <i class="fa-solid fa-circle-radiation"></i> [[#{accion.confirmar}]]
                            </h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>

                        <!-- Cuerpo del modal -->
                        <div class="modal-body">
                            <p>[[#{accion.confirmar.texto1}]] <span id="modalDescripcion"></span>?</p>
                            <h6>[[#{accion.confirmar.texto2}]]</h6>
                        </div>

                        <!-- Pie del modal -->
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-danger">
                                <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                            </button>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</html>
