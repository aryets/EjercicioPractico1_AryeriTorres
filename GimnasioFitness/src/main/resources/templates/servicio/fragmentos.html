<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <body>
        <!-- Agregar servicio -->
        <section th:fragment="agregar">
            <div class="d-flex justify-content-center my-3">
                <button type="button" class="btn btn-secondary rounded-pill px-4"
                        data-bs-toggle="modal" data-bs-target="#agregarServicioModal">
                    <i class="fa-solid fa-plus"></i> [[#{servicio.agregar}]]
                </button>
            </div>

            <div class="modal fade" id="agregarServicioModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content bg-dark text-light">
                        <form th:action="@{/servicio/guardar}" th:object="${servicio}" method="post">
                            <div class="modal-header bg-secondary text-white">
                                <h5 class="modal-title">[[#{servicio.agregar}]]</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <label>[[#{servicio.nombre}]]</label>
                                <input type="text" th:field="*{nombre}" class="form-control bg-dark text-light border-secondary" required/>
                                <label class="mt-3">[[#{servicio.precio}]]</label>
                                <input type="number" step="0.01" th:field="*{precio}" class="form-control bg-dark text-light border-secondary" required/>

                                <label class="mt-3">[[#{servicio.categoria}]]</label>
                                <select th:field="*{categoria}" class="form-select bg-dark text-light border-secondary" required>
                                    <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat.nombre}"></option>
                                </select>
                            </div>
                            <div class="modal-footer">
                                <button type="submit" class="btn btn-outline-light">[[#{accion.guardar}]]</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Listado de servicios -->
        <section th:fragment="listado">
            <div class="container my-4">
                <table class="table table-dark table-striped">
                    <thead>
                        <tr>
                            <th>[[#{servicio.nombre}]]</th>
                            <th>[[#{servicio.precio}]]</th>
                            <th>[[#{servicio.categoria}]]</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${servicios}">
                            <td th:text="${s.nombre}"></td>
                            <td th:text="${s.precio}"></td>
                            <td th:text="${s.categoria.nombre}"></td>
                            <td>
                                <!-- Botón Editar -->
                                <a href="#" class="btn btn-sm btn-outline-secondary"
                                   data-bs-toggle="modal" th:attr="data-bs-target='#editarModal__' + ${s.id}">
                                    [[#{accion.editar}]]
                                </a>
                                <!-- Botón Eliminar -->
                                <form th:action="@{/servicio/eliminar}" method="post" style="display:inline;">
                                    <input type="hidden" name="id" th:value="${s.id}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">[[#{accion.eliminar}]]</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <p>Total servicios: <span th:text="${servicios.size()}"></span></p>
            </div>
        </section>
    </body>
</html>
