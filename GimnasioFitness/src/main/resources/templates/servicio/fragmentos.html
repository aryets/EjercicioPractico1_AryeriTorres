<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <body>
        <!-- Agregar servicio -->
        <section th:fragment="agregar">
            <div class="d-flex justify-content-center my-3">
                <button type="button" class="btn btn-secondary rounded-pill px-4"
                        data-bs-toggle="modal" data-bs-target="#agregarServicioModal">
                    <i class="fa-solid fa-plus"></i> [[#{servicio.agregar}]]
                </button>
            </div>

            <div class="modal fade" id="agregarServicioModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content bg-dark text-light">
                        <form th:action="@{/servicio/guardar}" th:object="${servicio}" method="post">
                            <div class="modal-header bg-secondary text-white">
                                <h5 class="modal-title">[[#{servicio.agregar}]]</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <label>[[#{servicio.nombre}]]</label>
                                <input type="text" th:field="*{nombre}" class="form-control bg-dark text-light border-secondary" required/>
                                <label class="mt-3">[[#{servicio.precio}]]</label>
                                <input type="number" step="0.01" th:field="*{precio}" class="form-control bg-dark text-light border-secondary" required/>

                                <label class="mt-3">[[#{servicio.categoria}]]</label>
                                <select th:field="*{categoria.id}" class="form-select bg-dark text-light border-secondary" required>
                                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                                </select>
                            </div>
                            <div class="modal-footer">
                                <button type="submit" class="btn btn-outline-light">[[#{accion.guardar}]]</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Listado de servicios -->
        <section th:fragment="listado">
            <div class="container my-4">
                <table class="table table-light table-striped text-dark">
                    <thead>
                        <tr>
                            <th>[[#{servicio.nombre}]]</th>
                            <th>[[#{servicio.precio}]]</th>
                            <th>[[#{servicio.categoria}]]</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${servicios}">
                            <td th:text="${s.nombre}"></td>
                            <td th:text="${s.precio}"></td>
                            <td th:text="${s.categoria.nombre}"></td>
                            <td>
                                <!-- Botón Editar -->
                                <a href="#" class="btn btn-sm btn-outline-secondary"
                                   data-bs-toggle="modal" th:attr="data-bs-target='#editarModal__' + ${s.id}">
                                    <i class="fa fa-pencil-alt"></i> [[#{accion.editar}]]
                                </a>

                                <!-- Botón Eliminar -->
                                <a href="#" class="btn btn-sm btn-outline-dark"
                                   data-bs-toggle="modal" th:attr="data-bs-target='#eliminarModal__' + ${s.id}">
                                    <i class="fa fa-trash"></i> [[#{accion.eliminar}]]
                                </a>
                            </td>

                            <!-- Modal Editar -->
                    <div class="modal fade" th:id="'editarModal__' + ${s.id}" tabindex="-1">
                        <div class="modal-dialog">
                            <div class="modal-content bg-dark text-light">
                                <form th:action="@{/servicio/guardar}" method="post">
                                    <div class="modal-header bg-secondary text-white">
                                        <h5 class="modal-title">[[#{accion.actualizar}]]</h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        <input type="hidden" name="id" th:value="${s.id}"/>
                                        <label>[[#{servicio.nombre}]]</label>
                                        <input type="text" name="nombre" th:value="${s.nombre}"
                                               class="form-control bg-dark text-light border-secondary" required/>

                                        <label class="mt-3">[[#{servicio.precio}]]</label>
                                        <input type="number" step="0.01" name="precio" th:value="${s.precio}"
                                               class="form-control bg-dark text-light border-secondary" required/>

                                        <label class="mt-3">[[#{servicio.categoria}]]</label>
                                        <select name="categoria.id" class="form-select bg-dark text-light border-secondary" required>
                                            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"
                                                    th:selected="${s.categoria.id == cat.id}"></option>
                                        </select>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="submit" class="btn btn-outline-light">[[#{accion.guardar}]]</button>
                                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">[[#{accion.cerrar}]]</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Modal Eliminar -->
                    <div class="modal fade" th:id="'eliminarModal__' + ${s.id}" tabindex="-1">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content bg-dark text-light">
                                <form th:action="@{/servicio/eliminar}" method="post">
                                    <input type="hidden" name="id" th:value="${s.id}"/>
                                    <div class="modal-header bg-secondary text-white">
                                        <h5 class="modal-title">[[#{accion.confirmar}]]</h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        <p>[[#{accion.confirmar.texto1}]] <span th:text="${s.nombre}"></span>?</p>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="submit" class="btn btn-secondary">
                                            <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                                        </button>
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                            <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </body>
</html>
