spring.application.name=Gimnasio

# Puerto donde se escuchara el servidor
server.port=47

# Formato de despliegue de fecha/hora del log en la consola
logging.pattern.dateformat=hh:mm

# Eliminar mensajes invasivos de spring
spring.main.banner-mode=off

# Cache del servidor: false en durante el desarrollo, true en produccion
spring.thymeleaf.cache=false

# Conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gimnasio_fitness
spring.datasource.username=usuario_caso_prac2co_01
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mostrar información en el log
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG